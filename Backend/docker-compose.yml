services:
  postgres:
    image: postgres:18-alpine
    container_name: innoclinic_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5 
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    container_name: innoclinic_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5 
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: innoclinic_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  profiles.api:
    image: ${DOCKER_REGISTRY-}profilesapi
    container_name: profiles_api
    build:
      context: .
      dockerfile: Profiles/Profiles.API/Dockerfile
      secrets:
        - NUGET_TOKEN
        - NUGET_USER
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:8080"
      - "5001:8081" 
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${CERT_PASSWORD}
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx 
      - ConnectionStrings__DefaultConnection=${Profiles__DbConnection}
      - AppointmentsApiUrl=https://appointments.api:8083
      - DataProtection__Path=/app/keys
    volumes:
      - ${HOST_CERT_PATH}:/https:ro
      - ./keys/profiles:/app/keys
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  appointments.api:
    image: ${DOCKER_REGISTRY-}appointmentsapi
    container_name: appointments_api
    build:
      context: .
      dockerfile: Appointments/Appointments.API/Dockerfile
      secrets:
        - NUGET_TOKEN
        - NUGET_USER
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "6000:8082"
      - "6001:8083" 
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8082
      - ASPNETCORE_HTTPS_PORTS=8083
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${CERT_PASSWORD}
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx 
      - ConnectionStrings__DefaultConnection=${Appointments__DbConnection}
      - ConnectionStrings__Redis=${Appointments__RedisConnection}
      - ProfilesApiUrl=https://profiles.api:8081
    volumes:
      - ${HOST_CERT_PATH}:/https:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s 

  notifications.worker:
    image: ${DOCKER_REGISTRY-}notificationsworker
    container_name: notifications_worker
    build:
      context: .
      dockerfile: Notifications/Notifications.Worker/Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - ConnectionStrings__RabbitMQ=${ConnectionStrings__RabbitMQ}

volumes:
  postgres_data:
  redis_data:

secrets:
  NUGET_TOKEN:
    environment: NUGET_TOKEN
  NUGET_USER:
    environment: NUGET_USER
