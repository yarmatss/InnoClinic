name: Profiles Microservice CI

on:
  push:
    branches: ["main"]
    paths: ["Backend/Profiles/**", "Backend/Shared/**", ".github/workflows/profiles-ci.yml"]
  pull_request:
    branches: ["main"]
    paths: ["Backend/Profiles/**", "Backend/Shared/**"]

defaults:
  run:
    working-directory: ./Backend

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install SonarScanner
      run: dotnet tool install --global dotnet-sonarscanner

    - name: Begin SonarCloud Analysis
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        dotnet sonarscanner begin \
          /k:"yarmatss_InnoClinic_Profiles" \
          /o:"yarmatss" \
          /d:sonar.token="$SONAR_TOKEN" \
          /d:sonar.host.url="https://sonarcloud.io" \
          /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml"

    - name: Restore dependencies
      run: dotnet restore InnoClinic.Profiles.slnx

    - name: Build
      run: dotnet build InnoClinic.Profiles.slnx --no-restore --configuration Release

    - name: Run Tests
      run: >
        dotnet test --solution InnoClinic.Profiles.slnx 
        --no-build 
        --configuration Release 
        -- 
        --coverage 
        --coverage-settings coverage.runsettings 
        --coverage-output-format xml

    - name: End SonarCloud Analysis
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
